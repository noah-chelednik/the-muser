name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fluidsynth libfluidsynth-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests (CPU, no system deps)
        run: |
          pytest tests/ -v -m "not gpu and not system" \
            --ignore=tests/test_ollama_tools.py \
            --ignore=tests/test_llm_provider.py \
            --ignore=tests/test_curation_dimensions.py \
            --ignore=tests/test_curation_pipeline.py \
            --ignore=tests/test_v15_and_voice.py \
            --ignore=tests/test_voice_integration.py \
            --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

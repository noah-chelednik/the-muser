name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fluidsynth libfluidsynth-dev pkg-config

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]" 2>&1 || {
            echo "Full install failed, trying without optional C deps..."
            pip install -e ".[dev]" --no-build-isolation 2>&1 || {
              echo "Installing core deps individually..."
              pip install pytest pytest-cov ruff
              pip install pydantic click rich gitpython pyyaml lxml numpy scipy
              pip install librosa soundfile pretty-midi mido
              pip install litellm ollama music21
              pip install pyfluidsynth || echo "pyfluidsynth skipped"
              pip install symusic || echo "symusic skipped"
              pip install -e . --no-deps
            }
          }

      - name: Run tests (CPU, no system deps)
        run: |
          pytest tests/ -v -m "not gpu and not system" \
            --ignore=tests/test_ollama_tools.py \
            --ignore=tests/test_llm_provider.py \
            --ignore=tests/test_curation_dimensions.py \
            --ignore=tests/test_curation_pipeline.py \
            --ignore=tests/test_v15_and_voice.py \
            --ignore=tests/test_voice_integration.py \
            --ignore=tests/test_generators.py \
            --ignore=tests/test_diffsinger_wrapper.py \
            --ignore=tests/test_environment.py \
            --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
